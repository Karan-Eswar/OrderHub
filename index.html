<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Required for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zomato</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background-color: black;
            overflow: hidden; /* prevents scrollbars */
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ALWAYS fill screen */
            display: block;
        }
    </style>
</head>

<body onclick="openApp()">

    <img src="./img/zomato_bg.jpg" alt="Zomato Logo">

    <script>
        function openApp() {
            window.location.href = "dashboard.html";
        }
    </script>

</body>
</html>
