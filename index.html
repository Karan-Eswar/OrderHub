<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zomato</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100dvh; /* fixes mobile viewport issue */
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* fills screen properly */
            display: block;
        }
    </style>
</head>

<body onclick="openApp()">

    <div class="container">
        <img src="./img/zomato_bg.jpg" alt="Zomato">
    </div>

    <script>
        function openApp() {
            window.location.href = "dashboard.html";
        }
    </script>

</body>
</html>
