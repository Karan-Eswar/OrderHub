<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Delivery Dashboard</h1>

    <div id="onlineSection">
        <p>Are you online?</p>
        <button onclick="goOnline(true)">ONLINE</button>
        <button onclick="goOnline(false)">OFFLINE</button>
    </div>

    <div id="orderSection" class="hidden">
        <h2>ONLINE...</h2>
        <p>Delivery Boy is ONLINE...</p>
        <p><b>Your Order Id: 767264163500</b></p>
        <p>Accept order?</p>

        <button onclick="acceptOrder(true)">Accept</button>
        <button onclick="acceptOrder(false)">Reject</button>
    </div>

    <div id="resultSection" class="hidden"></div>

</div>

<script src="script.js"></script>

</body>
</html>
